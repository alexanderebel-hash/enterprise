server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=self, geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://wissen-api.domusvita-portal.de; media-src 'self' blob:; frame-ancestors 'self';" always;

    # Health check
    location /health {
        return 200 '{"status":"healthy"}';
        add_header Content-Type application/json;
    }

    # No source maps
    location ~* \.map$ {
        return 404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
